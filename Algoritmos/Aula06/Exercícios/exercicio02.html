<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Insira o tamanho da tela do celular:</p>
    <input type="text" id="ipt_tamanho">
    <p>Insira a cor do celular:</p>
    <select name="" id="ipt_cor">
        <option value=""></option>
        <option value="preto">Preto</option>
        <option value="prata">Prata</option>
        <option value="azul">Azul</option>
        <option value="vermelho">Vermelho</option>
    </select>
    <br>
    <br>
    <button onclick="gosta()">Será que ele gosta?</button>
    <div id="div_resultado"></div>
</body>
</html>
<script>
    function gosta() {
        let tamanho = Number(ipt_tamanho.value);
        let cor = ipt_cor.value;
        
        if (tamanho >= 6.5 && (cor == 'preto' || cor == 'prata')) {
            div_resultado.innerHTML = '<img src="laugh.jpg" width="400px">';
        } else {
            div_resultado.innerHTML = '<img src="sad.png" width="400px">';
        }
    }
</script>
